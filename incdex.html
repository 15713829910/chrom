<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>胡陈小学-校园卡信息管理系统</title>
    <style>
        *{box-sizing: border-box;margin: 0;padding: 0;font-family: "微软雅黑",sans-serif;}
        body{padding: 20px;background: #fffdf0;}
        .container{max-width: 1400px;margin: 0 auto;}
        h1{text-align: center;margin-bottom: 25px;color: #222;}
        .box{background: #fff;padding: 16px;border-radius: 8px;border: 1px solid #ddd;margin-bottom: 15px;}
        .row{display: flex;gap:12px;flex-wrap: wrap;align-items: center;margin:10px 0;}
        input,select{padding:8px 10px;border:1px solid #ccc;border-radius:4px;min-width:220px;font-size:14px;}
        button{padding:8px 16px;background:#238551;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:14px;}
        button:hover{background:#1c6e42;}
        table{width:100%;border-collapse: collapse;margin-top:10px;}
        th,td{border:1px solid #ddd;padding:10px;text-align:center;}
        th{background:#f5f5f5;}
        .tip{color:#666;font-size:13px;margin:8px 0;}
    </style>
</head>
<body>
<div class="container">
    <h1>胡陈小学 学生校园卡信息管理系统</h1>

    <!-- 查询区域 -->
    <div class="box">
        <h3>查询学生</h3>
        <div class="row">
            <input id="searchName" placeholder="输入姓名查询">
            <button onclick="searchByName()">按姓名查找</button>

            <input id="searchCard" placeholder="输入新旧卡号查询">
            <button onclick="searchByCard()">按卡号反查</button>
        </div>
    </div>

    <!-- 新增学生 -->
    <div class="box">
        <h3>新增学生信息</h3>
        <div class="row">
            <input id="addName" placeholder="姓名">
            <input id="addClass" placeholder="班级">
            <input id="addCard" placeholder="初始校园卡号">
            <button onclick="addStudent()">添加学生</button>
        </div>
    </div>

    <!-- 补办新卡 -->
    <div class="box">
        <h3>校园卡补办换新卡（旧卡自动作废）</h3>
        <div class="row">
            <input id="stuIdForNewCard" placeholder="输入学生ID">
            <input id="newCardNo" placeholder="填写新卡号">
            <button onclick="replaceCard()">确认补办新卡</button>
        </div>
    </div>

    <!-- 结果展示区 -->
    <div class="box">
        <h3>查询结果 & 卡号历史记录</h3>
        <div id="resultBox"></div>
    </div>

    <!-- 导出备份 -->
    <div class="box">
        <button onclick="exportJson()">导出全部数据JSON备份</button>
        <p class="tip">导出后可替换仓库内data.json完成数据保存</p>
    </div>
</div>

<script>
// 读取本地数据
let studentList = [];
async function loadData(){
    try{
        const res = await fetch('./data.json');
        studentList = await res.json();
    }catch(e){
        studentList = [];
        console.log("读取数据失败，请检查data.json文件");
    }
}
loadData();

// 按姓名查询
function searchByName(){
    const name = document.getElementById('searchName').value.trim();
    if(!name){alert("请输入姓名");return;}
    const arr = studentList.filter(s=>s.name.includes(name));
    renderResult(arr);
}

// 按卡号反查
function searchByCard(){
    const card = document.getElementById('searchCard').value.trim();
    if(!card){alert("请输入卡号");return;}
    const arr = [];
    studentList.forEach(s=>{
        const match = s.cardList.find(c=>c.cardNo===card);
        if(match) arr.push(s);
    })
    renderResult(arr);
}

// 渲染页面结果
function renderResult(list){
    const box = document.getElementById('resultBox');
    if(list.length===0){
        box.innerHTML = "<p>未匹配到对应学生信息</p>";
        return;
    }
    let html = "";
    list.forEach(stu=>{
        html += `
        <div style="margin:12px 0;border:1px solid #eee;padding:12px;border-radius:6px;">
            <p><b>学生ID：</b>${stu.id}</p>
            <p><b>姓名：</b>${stu.name} &nbsp;&nbsp; <b>班级：</b>${stu.className} &nbsp;&nbsp; <b>学校：</b>${stu.school}</p>
            <p><b>当前最新有效卡号：</b>${stu.latestCardNo}</p>
            <table>
                <tr><th>卡号</th><th>状态</th><th>办卡时间</th></tr>
        `;
        stu.cardList.forEach(c=>{
            html += `<tr>
                <td>${c.cardNo}</td>
                <td style="${c.status==='当前有效'?'color:green;font-weight:bold':'color:#999'}">${c.status}</td>
                <td>${c.createTime}</td>
            </tr>`;
        })
        html += `</table>
            <div style="margin-top:8px;">
                <button onclick="editStu(${stu.id})">修改信息</button>
                <button style="background:#b33" onclick="delStu(${stu.id})">删除该学生</button>
            </div>
        </div>`;
    })
    box.innerHTML = html;
}

// 新增学生
function addStudent(){
    const name = document.getElementById('addName').value.trim();
    const cls = document.getElementById('addClass').value.trim();
    const card = document.getElementById('addCard').value.trim();
    if(!name||!cls||!card){alert("姓名、班级、卡号不能为空");return;}
    const newId = studentList.length>0 ? Math.max(...studentList.map(s=>s.id))+1 : 1;
    const now = new Date().toISOString().slice(0,10);
    const newStu = {
        id:newId,
        name:name,
        school:"胡陈小学",
        className:cls,
        latestCardNo:card,
        cardList:[{cardNo:card,status:"当前有效",createTime:now}]
    }
    studentList.push(newStu);
    alert("新增成功，请导出JSON替换data.json保存数据");
    clearInput();
}

// 补办换卡
function replaceCard(){
    const sid = Number(document.getElementById('stuIdForNewCard').value.trim());
    const newCard = document.getElementById('newCardNo').value.trim();
    if(!sid||!newCard){alert("请填写学生ID与新卡号");return;}
    const stu = studentList.find(s=>s.id===sid);
    if(!stu){alert("未找到该学生");return;}
    // 旧卡全部标记作废
    stu.cardList.forEach(c=>c.status="已挂失作废");
    // 添加新卡
    const now = new Date().toISOString().slice(0,10);
    stu.cardList.push({cardNo:newCard,status:"当前有效",createTime:now});
    stu.latestCardNo = newCard;
    alert("换卡完成，请导出JSON替换data.json保存数据");
    clearInput();
}

// 删除学生
function delStu(id){
    if(!confirm("确定删除该学生全部记录？"))return;
    studentList = studentList.filter(s=>s.id!==id);
    document.getElementById('resultBox').innerHTML = "";
    alert("已删除，请导出JSON保存");
}

// 修改学生简易弹窗
function editStu(id){
    const stu = studentList.find(s=>s.id===id);
    if(!stu)return;
    const newName = prompt("修改姓名",stu.name);
    const newClass = prompt("修改班级",stu.className);
    if(newName) stu.name = newName;
    if(newClass) stu.className = newClass;
    alert("修改完成，导出JSON保存数据");
}

// 清空输入框
function clearInput(){
    document.getElementById('addName').value = "";
    document.getElementById('addClass').value = "";
    document.getElementById('addCard').value = "";
    document.getElementById('stuIdForNewCard').value = "";
    document.getElementById('newCardNo').value = "";
}

// 导出JSON文件
function exportJson(){
    const str = JSON.stringify(studentList,null,4);
    const blob = new Blob([str],{type:"application/json"});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = "data.json";
    a.click();
    alert("已下载最新数据，上传替换仓库里的data.json即可永久保存");
}
</script>
</body>
</html>
